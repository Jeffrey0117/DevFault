<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>devup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #121212;
      color: #c9cdd3;
      padding: 28px 24px;
      user-select: none;
    }

    /* Header */
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e0c37e, #d4a054);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header .version {
      font-size: 11px;
      color: #444;
      font-weight: 500;
    }
    .lang-toggle {
      font-size: 11px;
      color: #555;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 3px 8px;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 600;
    }
    .lang-toggle:hover { color: #d4a054; border-color: #d4a054; }

    /* Tools */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #555;
      margin-bottom: 10px;
    }
    .tools-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .tool-chip {
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 6px;
      letter-spacing: 0.3px;
    }
    .tool-chip.ok {
      background: rgba(72, 187, 120, 0.12);
      color: #48bb78;
      border: 1px solid rgba(72, 187, 120, 0.2);
    }
    .tool-chip.missing {
      background: rgba(229, 62, 62, 0.12);
      color: #fc8181;
      border: 1px solid rgba(229, 62, 62, 0.2);
    }

    /* Repos */
    .repo-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .repo-card {
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s, background 0.2s;
    }
    .repo-card:hover {
      border-color: #333;
      background: #1e1e1e;
    }
    .repo-card.is-running {
      border-color: rgba(72, 187, 120, 0.3);
      background: rgba(72, 187, 120, 0.04);
    }

    .repo-info { display: flex; align-items: center; gap: 12px; }

    .repo-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: #252525;
    }
    .repo-icon-fallback {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      flex-shrink: 0;
      background: #252525;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #555;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.running {
      background: #48bb78;
      box-shadow: 0 0 8px rgba(72, 187, 120, 0.5);
      animation: pulse 2s ease-in-out infinite;
    }
    .status-dot.stopped { background: #333; }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(72, 187, 120, 0.5); }
      50% { opacity: 0.5; box-shadow: 0 0 4px rgba(72, 187, 120, 0.2); }
    }

    .repo-text { display: flex; flex-direction: column; gap: 1px; }
    .repo-name { font-size: 14px; font-weight: 600; color: #e2e4e8; }
    .repo-cmd {
      font-size: 11px;
      color: #4a4a5a;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }

    .tag-no-run {
      font-size: 10px;
      color: #444;
      font-style: italic;
    }
    .tag-not-cloned {
      font-size: 10px;
      color: #fc8181;
    }

    /* Buttons */
    .btn {
      border: none;
      border-radius: 7px;
      padding: 7px 18px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }
    .btn:active { transform: scale(0.96); }
    .btn-run {
      background: linear-gradient(135deg, #d4a054, #c08a3e);
      color: #fff;
    }
    .btn-run:hover { background: linear-gradient(135deg, #e0b06a, #d4a054); }
    .btn-stop {
      background: rgba(229, 62, 62, 0.15);
      color: #fc8181;
      border: 1px solid rgba(229, 62, 62, 0.25);
    }
    .btn-stop:hover { background: rgba(229, 62, 62, 0.25); }
    .btn-disabled {
      background: transparent;
      color: #333;
      cursor: default;
    }
    .btn-disabled:active { transform: none; }

    /* Footer */
    .footer {
      margin-top: 24px;
      display: flex;
      justify-content: center;
    }
    .btn-sync {
      background: transparent;
      color: #d4a054;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 9px 36px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }
    .btn-sync:hover {
      background: rgba(212, 160, 84, 0.1);
      border-color: rgba(212, 160, 84, 0.3);
    }
    .btn-sync:active { transform: scale(0.97); }
    .btn-sync:disabled { opacity: 0.3; cursor: default; transform: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>devup</h1>
    <div class="header-right">
      <span class="version">v1.0.0</span>
      <button class="lang-toggle" id="lang-btn" onclick="toggleLang()">EN</button>
    </div>
  </div>

  <div class="section-label" id="label-tools">TOOLS</div>
  <div class="tools-bar" id="tools-bar"></div>

  <div class="section-label" id="label-projects">PROJECTS</div>
  <div class="repo-list" id="repo-list"></div>

  <div class="footer">
    <button class="btn-sync" id="sync-btn" onclick="syncAll()">Sync All</button>
  </div>

  <script>
    const { ipcRenderer } = require("electron")

    const i18n = {
      zh: {
        tools: "工具",
        projects: "專案",
        run: "啟動",
        stop: "停止",
        syncAll: "同步全部",
        syncing: "同步中...",
        notCloned: "尚未下載",
        noRunCmd: "無啟動指令",
        toggle: "EN",
      },
      en: {
        tools: "TOOLS",
        projects: "PROJECTS",
        run: "Run",
        stop: "Stop",
        syncAll: "Sync All",
        syncing: "Syncing...",
        notCloned: "not cloned",
        noRunCmd: "no run command",
        toggle: "中",
      },
    }

    let lang = localStorage.getItem("devup-lang") || "zh"

    function t(key) { return i18n[lang][key] }

    function applyLang() {
      document.getElementById("label-tools").textContent = t("tools")
      document.getElementById("label-projects").textContent = t("projects")
      document.getElementById("lang-btn").textContent = t("toggle")
      document.getElementById("sync-btn").textContent = t("syncAll")
    }

    function toggleLang() {
      lang = lang === "zh" ? "en" : "zh"
      localStorage.setItem("devup-lang", lang)
      applyLang()
      load()
    }

    async function load() {
      const { tools, repos } = await ipcRenderer.invoke("get-data")

      // Tools
      const bar = document.getElementById("tools-bar")
      bar.innerHTML = ""
      for (const t of tools) {
        const chip = document.createElement("span")
        chip.className = `tool-chip ${t.installed ? "ok" : "missing"}`
        chip.textContent = t.name
        bar.appendChild(chip)
      }

      // Repos
      const list = document.getElementById("repo-list")
      list.innerHTML = ""
      for (const r of repos) {
        const card = document.createElement("div")
        card.className = "repo-card" + (r.running ? " is-running" : "")

        const icon = r.logo
          ? `<img class="repo-icon" src="file:///${r.logo.replace(/\\/g, '/')}">`
          : `<div class="repo-icon-fallback">${r.name[0].toUpperCase()}</div>`

        const dot = r.running
          ? '<span class="status-dot running"></span>'
          : '<span class="status-dot stopped"></span>'

        if (!r.cloned) {
          card.innerHTML = `
            <div class="repo-info">
              ${icon}
              <div class="repo-text">
                <span class="repo-name">${r.name}</span>
                <span class="tag-not-cloned">${t("notCloned")}</span>
              </div>
            </div>
            <button class="btn btn-disabled" disabled>--</button>`
        } else if (!r.run) {
          card.innerHTML = `
            <div class="repo-info">
              ${icon}
              <div class="repo-text">
                <span class="repo-name">${r.name}</span>
                <span class="tag-no-run">${t("noRunCmd")}</span>
              </div>
            </div>
            <button class="btn btn-disabled" disabled>--</button>`
        } else if (r.running) {
          card.innerHTML = `
            <div class="repo-info">
              ${icon}
              <div class="repo-text">
                <span class="repo-name">${dot} ${r.name}</span>
                <span class="repo-cmd">${r.run}</span>
              </div>
            </div>
            <button class="btn btn-stop" onclick="stop('${r.name}')">${t("stop")}</button>`
        } else {
          card.innerHTML = `
            <div class="repo-info">
              ${icon}
              <div class="repo-text">
                <span class="repo-name">${dot} ${r.name}</span>
                <span class="repo-cmd">${r.run}</span>
              </div>
            </div>
            <button class="btn btn-run" onclick="run('${r.name}')">${t("run")}</button>`
        }
        list.appendChild(card)
      }
    }

    async function run(name) {
      await ipcRenderer.invoke("run-project", name)
      load()
    }

    async function stop(name) {
      await ipcRenderer.invoke("stop-project", name)
      load()
    }

    async function syncAll() {
      const btn = document.getElementById("sync-btn")
      btn.disabled = true
      btn.textContent = t("syncing")
      await ipcRenderer.invoke("sync-all")
      btn.textContent = t("syncAll")
      btn.disabled = false
      load()
    }

    // Auto-refresh when a process exits
    ipcRenderer.on("status-changed", () => load())

    applyLang()
    load()
  </script>
</body>
</html>
